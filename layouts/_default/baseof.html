<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" data-theme="">
<script>(function(){var t=localStorage.getItem('rmrf-theme');document.documentElement.setAttribute('data-theme',t||'dark');})()</script>
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="llama-bg llama-bg-1"></div>
    <div class="llama-bg llama-bg-2"></div>
    <div class="llama-bg llama-bg-3"></div>
    <div class="llama-bg llama-bg-4"></div>
  </div>
  {{ partial "header.html" . }}
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  (function() {
    var nav = document.getElementById('floatNav');
    if (nav) nav.classList.add('visible');
  })();
  </script>
  <script>
  (function(){
    var KEY='rmrf-theme';
    var html=document.documentElement;
    document.querySelectorAll('.theme-toggle').forEach(function(btn){
      btn.addEventListener('click',function(){
        var cur=html.getAttribute('data-theme');
        var next=cur==='light'?'dark':'light';
        html.setAttribute('data-theme',next);
        localStorage.setItem(KEY,next);
      });
    });
  })();
  </script>
</body>
</html>
