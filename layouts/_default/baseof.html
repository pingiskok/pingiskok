<!DOCTYPE html>
<html lang="ru">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="llama-bg llama-bg-1"></div>
    <div class="llama-bg llama-bg-2"></div>
    <div class="llama-bg llama-bg-3"></div>
    <div class="llama-bg llama-bg-4"></div>
  </div>
  {{ partial "header.html" . }}
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  (function() {
    var nav = document.getElementById('floatNav');
    if (!nav) return;
    var hero = document.querySelector('.hero');
    if (!hero) { nav.classList.add('visible'); return; }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          nav.classList.remove('visible');
        } else {
          nav.classList.add('visible');
        }
      });
    }, { threshold: 0 });
    observer.observe(hero);
  })();
  </script>
</body>
</html>
